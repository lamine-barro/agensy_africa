services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agensy
      POSTGRES_USER: agensy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./api/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agensy -d agensy"]
      interval: 5s
      timeout: 5s
      retries: 10
  api:
    build: .
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://agensy:${POSTGRES_PASSWORD}@postgres:5432/agensy
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"
volumes:
  postgres_data:
